<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BANE Aero Systems</title>
    <script type="text/javascript">
      // Dynamic Single Page Apps for GitHub Pages
      var l = window.location;
      var pathSegmentsToKeep = 0;
      if (l.hostname.indexOf('github.io') !== -1) {
        var parts = l.pathname.split('/');
        if (parts.length > 1 && parts[1] !== '') {
          var firstSegment = parts[1];
          var knownRoutes = ['services', 'flight-permit', 'adsb-detail', 'flight-plan-detail', 'aeronautical-invoice-detail', 'general-aviation-detail', 'gallery', 'blog', 'booking', 'admin'];
          if (knownRoutes.indexOf(firstSegment) === -1) {
            pathSegmentsToKeep = 1;
          }
        }
      }

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
